<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Лабораторна робота 2</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<main class="container">
    <section class="cards-grid">
        <article class="card">
            <i class="fa-solid fa-location-dot"></i>
            <h3>OUR MAIN OFFICE</h3>
            <p>SoHo 94 Broadway St<br>New York, NY 1001</p>
        </article>
        <article class="card">
            <i class="fa-solid fa-phone"></i>
            <h3>PHONE NUMBER</h3>
            <p>234-9876-5400<br>888-0123-4567 (Toll Free)</p>
        </article>
        <article class="card">
            <i class="fa-solid fa-fax"></i>
            <h3>FAX</h3>
            <p>1-234-567-8900</p>
        </article>
        <article class="card">
            <i class="fa-solid fa-envelope"></i>
            <h3>EMAIL</h3>
            <a href="https://github.com/Yarichechok" target="_blank">hello@theme.com</a>
        </article>
    </section>

    <section class="contact-form-section">
        <h2>Contact Us</h2>
        <form action="#" method="POST" class="contact-form">
            <input type="text" placeholder="Enter your Name" required>
            <input type="email" placeholder="Enter a valid email address" required>
            <textarea placeholder="" rows="5" required></textarea>
            <button type="submit">SUBMIT</button>
        </form>
    </section>
</main>
</body>
</html>
